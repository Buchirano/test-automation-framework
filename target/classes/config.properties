################################################################################
# config.properties — Test Automation Framework
#
# Central configuration file for the test automation framework.
# Mirrors the ATI framework's config.properties structure.
# All values can be overridden at runtime via -Dkey=value Maven arguments,
# which the Jenkins pipeline uses to inject environment-specific settings.
################################################################################

# ─── Browser Configuration ────────────────────────────────────────────────────
# Options: CHROME | FIREFOX | EDGE
BROWSER=CHROME

# Run browser in headless mode (true for CI/Jenkins, false for local debugging)
HEADLESS=true

# Screen resolution — larger values help with UI elements that shift in headless
SCREEN_WIDTH=1920
SCREEN_HEIGHT=1080

# ─── Application URL ─────────────────────────────────────────────────────────
# Base URL for the application under test.
# Override per environment: -DAPP_URL=https://staging.yourapp.com
APP_URL=https://yourapp.example.com

# Test environment label shown in reports and Slack notifications
TEST_ENV=QA

# ─── Wait Configuration ───────────────────────────────────────────────────────
# Default implicit wait time in seconds for WebDriver element searches
SEARCH_WAIT_SECONDS=15

# ─── Logging & Reports ───────────────────────────────────────────────────────
# Log type: HTML | EXCEL | BOTH
LOG_TYPE=HTML

# Preserve old logs (true = keep history, false = overwrite on each run)
PRESERVE_LOGS=true

# ─── Browser Behavior ────────────────────────────────────────────────────────
# Close browser automatically when test completes
# Set to false during page class development to leave browser open for inspection
CLOSE_ON_TERMINATE=true

# ─── Test Data ────────────────────────────────────────────────────────────────
# Path to the test datasets folder (relative to project root)
DATASETS_FOLDER=src/test/resources/datasets

# Optional: path to download directory (for tests that download files)
# DOWNLOAD_FOLDER=C:\\Users\\YourUser\\Downloads

# ─── Daily Logs ───────────────────────────────────────────────────────────────
# Folder path for daily execution summary logs (optional)
# DAILY_LOGS_FOLDER=target/daily-logs

# ─── Automation Tool ──────────────────────────────────────────────────────────
# Which Selenium WebDriver core to use
AUTOMATION_TOOL=SELENIUM
